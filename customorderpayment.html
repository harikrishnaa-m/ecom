<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Manual Razorpay Checkout</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 720px;
        margin: 32px auto;
        padding: 0 16px;
      }
      label,
      input,
      button,
      pre {
        display: block;
        width: 100%;
        margin-bottom: 12px;
      }
      input {
        padding: 10px;
        font-size: 16px;
      }
      button {
        padding: 12px 16px;
        font-size: 16px;
        cursor: pointer;
      }
      pre {
        padding: 16px;
        background: #f4f4f4;
        border: 1px solid #ddd;
        white-space: pre-wrap;
        word-break: break-word;
      }
    </style>
  </head>
  <body>
    <h1>Manual Razorpay Checkout</h1>
    <p>
      Enter your Razorpay order ID and click Pay. The page will show the payload
      that should be sent to your verify route.
    </p>

    <label for="orderId">Razorpay Order ID</label>
    <input id="orderId" type="text" value="order_T9Nf9bCsW0cmYK" />

    <button id="payButton">Pay Now</button>

    <h2>Payment response payload</h2>
    <pre id="result">No payment attempted yet.</pre>

    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script>
      const razorpayKey = "rzp_test_T5Z6ecmWOUIvaV";

      document.getElementById("payButton").addEventListener("click", () => {
        const orderId = document.getElementById("orderId").value.trim();
        if (!orderId) {
          document.getElementById("result").textContent =
            "Please enter a Razorpay order ID.";
          return;
        }

        const options = {
          key: razorpayKey,
          order_id: orderId,
          name: "Your Store",
          description: "Custom order payment",
          handler: function (response) {
            const payload = {
              order_id: response.razorpay_order_id,
              payment_id: response.razorpay_payment_id,
              signature: response.razorpay_signature,
            };
            document.getElementById("result").textContent = JSON.stringify(
              payload,
              null,
              2,
            );
          },
          modal: {
            ondismiss: function () {
              document.getElementById("result").textContent =
                "Checkout closed without payment.";
            },
          },
        };

        const rzp = new Razorpay(options);
        rzp.open();
      });
    </script>
  </body>
</html>
